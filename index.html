<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOUR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#E84C1E;color:#111;font-family:'IBM Plex Mono',monospace;min-height:100vh;max-width:480px;margin:0 auto;}
.top{padding:48px 24px 0;}
.top-label{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#111;margin-bottom:6px;}
.top-line{height:1.5px;background:#111;}
.top-number{font-size:120px;font-weight:700;line-height:0.85;color:#111;letter-spacing:-0.05em;font-family:'IBM Plex Mono',monospace;}
.top-line2{height:1.5px;background:#111;margin-top:4px;}
.top-foot{display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(17,17,17,0.65);margin-top:8px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:28px 24px 0;}
.month-nav-line{height:1.5px;background:#111;margin:0 24px;}
.month-name{font-size:64px;font-weight:700;line-height:0.9;color:#111;letter-spacing:-0.03em;flex:1;font-family:'IBM Plex Mono',monospace;}
.nav-btn{background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:700;color:#111;padding:0 4px;line-height:1;flex-shrink:0;}
.nav-btn:hover{opacity:0.5;}
.month-year{font-size:13px;letter-spacing:0.1em;color:rgba(17,17,17,0.6);margin-top:4px;padding:0 24px;}
.month-shows-count{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(17,17,17,0.55);padding:6px 24px 0;}
.day-list{padding:16px 24px 120px;}
.day-block{border-bottom:1px solid rgba(17,17,17,0.25);}
.day-header{display:flex;align-items:baseline;gap:16px;padding:14px 0;cursor:pointer;user-select:none;}
.day-num-big{font-size:52px;font-weight:700;line-height:1;color:#111;letter-spacing:-0.03em;min-width:72px;font-family:'IBM Plex Mono',monospace;}
.day-num-big.today{text-decoration:underline;text-underline-offset:6px;}
.day-right{flex:1;}
.day-weekday{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(17,17,17,0.55);}
.day-month-label{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#111;margin-top:2px;}
.day-indicator{font-size:14px;color:rgba(17,17,17,0.4);margin-left:auto;}
.day-shows-cont{display:none;}
.day-block.has-show .day-shows-cont,.day-block.open .day-shows-cont{display:block;}
.day-show{padding:0 0 12px 88px;border-bottom:1px dashed rgba(17,17,17,0.15);margin-bottom:12px;}
.show-venue{font-size:15px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#111;line-height:1.2;}
.show-group{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#111;margin-top:3px;}
.show-city{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(17,17,17,0.6);margin-top:2px;}
.show-btns{display:flex;gap:8px;margin-top:10px;}
.btn-inv{background:#111;color:#E84C1E;border:none;padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;}
.btn-del{background:none;border:1px solid rgba(17,17,17,0.45);color:rgba(17,17,17,0.6);padding:5px 14px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;}
.btn-del:hover{border-color:#111;color:#111;}
.day-add{padding:0 0 14px 88px;display:none;}
.day-block.open .day-add{display:block;}
.tap-add{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(17,17,17,0.4);cursor:pointer;padding:4px 0;}
.fab{position:fixed;bottom:28px;right:24px;background:#111;color:#E84C1E;border:none;width:54px;height:54px;font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.overlay.open{display:flex;}
.sheet{background:#E84C1E;width:100%;max-width:480px;padding:28px 24px 44px;border-top:2px solid #111;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.16,1,0.3,1);}
.inv-sheet{background:#E84C1E;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding:28px 24px 44px;border-top:2px solid #111;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.16,1,0.3,1);}
.overlay.open .sheet,.overlay.open .inv-sheet{transform:translateY(0);}
.sh-title{font-size:14px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#111;padding-bottom:12px;border-bottom:1.5px solid #111;margin-bottom:18px;}
.f-label{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(17,17,17,0.55);display:block;margin-bottom:4px;}
.f-group{margin-bottom:14px;}
.f-in{width:100%;background:transparent;border:none;border-bottom:1.5px solid #111;padding:8px 0;font-family:'IBM Plex Mono',monospace;font-size:14px;color:#111;outline:none;}
.f-in::placeholder{color:rgba(17,17,17,0.3);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sh-actions{display:flex;gap:10px;margin-top:20px;}
.btn-ok{flex:1;background:#111;color:#E84C1E;border:none;padding:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;}
.btn-cc{background:none;border:1.5px solid #111;padding:14px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;color:#111;}
.inv-sec{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(17,17,17,0.55);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(17,17,17,0.25);}
.li-row{display:grid;grid-template-columns:1fr 85px 26px;gap:6px;margin-bottom:6px;align-items:center;}
.li-in{background:transparent;border:none;border-bottom:1px solid rgba(17,17,17,0.4);padding:7px 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#111;outline:none;width:100%;}
.li-in::placeholder{color:rgba(17,17,17,0.3);}
.li-r{text-align:right;}
.btn-rm{background:none;border:none;color:rgba(17,17,17,0.3);font-size:18px;cursor:pointer;}
.btn-addli{background:none;border:1px dashed rgba(17,17,17,0.35);padding:7px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(17,17,17,0.5);cursor:pointer;width:100%;margin-top:4px;}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1.5px solid #111;margin-top:10px;}
.tot-label{font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#111;}
.tot-sub{font-size:9px;color:rgba(17,17,17,0.5);letter-spacing:0.1em;margin-top:2px;}
.tot-amt{font-size:40px;font-weight:700;color:#111;letter-spacing:-0.03em;}
.btn-pdf{width:100%;background:#111;color:#E84C1E;border:none;padding:15px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-close{width:100%;background:none;border:1.5px solid #111;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;color:#111;margin-top:10px;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#E84C1E;padding:9px 18px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.1em;opacity:0;transition:all 0.25s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="top">
  <div class="top-label">Shows programados:</div>
  <div class="top-line"></div>
  <div class="top-number" id="topCount">000</div>
  <div class="top-line2"></div>
  <div class="top-foot"><span id="topYear">2025/2026</span><span>TOUR CALENDAR</span></div>
</div>
<div style="padding:28px 24px 0"><div class="top-label">Mes en curso:</div></div>
<div class="month-nav-line"></div>
<div class="month-nav">
  <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
  <div><div class="month-name" id="monthName">—</div></div>
  <button class="nav-btn" onclick="changeMonth(1)">›</button>
</div>
<div class="month-year" id="monthYear">—</div>
<div class="month-shows-count" id="monthCount">— shows este mes</div>
<div class="day-list" id="dayList"></div>
<button class="fab" onclick="openAdd(null)">+</button>
<div class="overlay" id="addOverlay">
  <div class="sheet">
    <div class="sh-title">Añadir show</div>
    <div class="f-group"><label class="f-label">Fecha</label><input type="date" class="f-in" id="eDate"></div>
    <div class="f-group"><label class="f-label">Grupo / Artista</label><input type="text" class="f-in" id="eGroup" placeholder="Nombre del grupo"></div>
    <div class="f-group"><label class="f-label">Sala / Venue</label><input type="text" class="f-in" id="eVenue" placeholder="Sala Apolo"></div>
    <div class="f-group"><label class="f-label">Ciudad</label><input type="text" class="f-in" id="eCity" placeholder="Barcelona"></div>
    <div class="sh-actions">
      <button class="btn-cc" onclick="closeAll()">Cancelar</button>
      <button class="btn-ok" onclick="addEvent()">Añadir</button>
    </div>
  </div>
</div>
<div class="overlay" id="invOverlay">
  <div class="inv-sheet">
    <div style="font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(17,17,17,0.55);margin-bottom:2px">Factura</div>
    <div class="sh-title" id="invTitle">—</div>
    <div class="inv-sec">Artista / Emisor</div>
    <div class="row2" style="margin-bottom:10px">
      <div><label class="f-label">Nombre</label><input type="text" class="li-in" id="i_artist" placeholder="Tu nombre"></div>
      <div><label class="f-label">NIF</label><input type="text" class="li-in" id="i_nif" placeholder="12345678A"></div>
    </div>
    <label class="f-label">Dirección</label>
    <input type="text" class="li-in" id="i_address" placeholder="Calle, número, ciudad" style="width:100%;margin-bottom:4px">
    <div class="inv-sec">Cliente / Promotor</div>
    <div class="row2">
      <div><label class="f-label">Empresa</label><input type="text" class="li-in" id="i_client" placeholder="Promotor"></div>
      <div><label class="f-label">NIF</label><input type="text" class="li-in" id="i_cnif" placeholder="B12345678"></div>
    </div>
    <div class="inv-sec">Nº Factura</div>
    <input type="text" class="li-in" id="i_num" placeholder="FAC-001" style="width:100%">
    <div class="inv-sec">Conceptos</div>
    <div id="liCont"></div>
    <button class="btn-addli" onclick="addLine()">+ Añadir línea</button>
    <div class="inv-sec">IVA (%)</div>
    <div style="display:flex;align-items:center;gap:10px">
      <input type="number" class="li-in" id="i_iva" value="21" style="width:64px;text-align:center" oninput="calcTotal();saveFac()">
      <span style="font-size:11px;color:rgba(17,17,17,0.5)">%</span>
    </div>
    <div class="tot-row">
      <div><div class="tot-label">Total</div><div class="tot-sub">IVA incluido</div></div>
      <div class="tot-amt" id="invTotal">€0</div>
    </div>
    <button class="btn-pdf" onclick="dlPDF()">↓ Descargar PDF</button>
    <button class="btn-close" onclick="closeAll()">Cerrar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const PRELOAD=[
  {id:'p1',date:'2026-04-24',venue:'',city:'Lugo',group:'Carlos Ares',fac:null},
  {id:'p2',date:'2026-04-25',venue:'',city:'A Coruña',group:'Carlos Ares',fac:null},
  {id:'p3',date:'2026-04-26',venue:'',city:'A Coruña',group:'Carlos Ares',fac:null},
  {id:'p4',date:'2026-04-27',venue:'',city:'A Coruña',group:'Carlos Ares',fac:null},
  {id:'p5',date:'2026-05-02',venue:'',city:'Murcia',group:'Carlos Ares',fac:null},
  {id:'p6',date:'2026-05-08',venue:'',city:'Cascante (Navarra)',group:'Carlos Ares',fac:null},
  {id:'p7',date:'2026-05-09',venue:'',city:'Toledo',group:'Carlos Ares',fac:null},
  {id:'p8',date:'2026-05-15',venue:'',city:'Armilla (Granada)',group:'Carlos Ares',fac:null},
  {id:'p9',date:'2026-05-16',venue:'',city:'Sevilla',group:'Carlos Ares',fac:null},
  {id:'p10',date:'2026-05-22',venue:'',city:'Ourense',group:'Carlos Ares',fac:null},
  {id:'p11',date:'2026-05-23',venue:'',city:'Málaga',group:'Carlos Ares',fac:null},
  {id:'p12',date:'2026-05-28',venue:'',city:'Donosti',group:'Carlos Ares',fac:null},
  {id:'p13',date:'2026-05-29',venue:'',city:'Valencia',group:'Carlos Ares',fac:null},
  {id:'p14',date:'2026-06-06',venue:'',city:'Zamora',group:'Carlos Ares',fac:null},
  {id:'p15',date:'2026-06-13',venue:'',city:'Baeza (Jaén)',group:'Carlos Ares',fac:null},
  {id:'p16',date:'2026-06-18',venue:'',city:'Santiago de Compostela',group:'Carlos Ares',fac:null},
  {id:'p17',date:'2026-06-19',venue:'',city:'Albacete',group:'Carlos Ares',fac:null},
  {id:'p18',date:'2026-06-20',venue:'',city:'Girona',group:'Carlos Ares',fac:null},
  {id:'p19',date:'2026-06-26',venue:'',city:'La Vila Joiosa (Alicante)',group:'Carlos Ares',fac:null},
  {id:'p20',date:'2026-07-04',venue:'',city:'La Solana (Ciudad Real)',group:'Carlos Ares',fac:null},
  {id:'p21',date:'2026-07-16',venue:'',city:'Benicassim (Castellón)',group:'Carlos Ares',fac:null},
  {id:'p22',date:'2026-07-18',venue:'',city:'Vilagarcía de Arousa (Pontevedra)',group:'Carlos Ares',fac:null},
  {id:'p23',date:'2026-07-23',venue:'',city:'Lanuza (Huesca)',group:'Carlos Ares',fac:null},
  {id:'p24',date:'2026-07-25',venue:'',city:'San Fernando de Cádiz',group:'Carlos Ares',fac:null},
  {id:'p25',date:'2026-07-31',venue:'',city:'Borja (Zaragoza)',group:'Carlos Ares',fac:null},
  {id:'p26',date:'2026-08-01',venue:'',city:'Santander',group:'Carlos Ares',fac:null},
  {id:'p27',date:'2026-08-02',venue:'',city:'Benidorm (Alicante)',group:'Carlos Ares',fac:null},
  {id:'p28',date:'2026-08-07',venue:'',city:'Aranda de Duero (Burgos)',group:'Carlos Ares',fac:null},
  {id:'p29',date:'2026-08-08',venue:'',city:'Zamora',group:'Carlos Ares',fac:null},
  {id:'p30',date:'2026-08-10',venue:'',city:'Luanco (Asturias)',group:'Carlos Ares',fac:null},
  {id:'p31',date:'2026-08-13',venue:'',city:'Gandía (Valencia)',group:'Carlos Ares',fac:null},
  {id:'p32',date:'2026-08-21',venue:'',city:'Ezcaray (La Rioja)',group:'Carlos Ares',fac:null},
  {id:'p33',date:'2026-08-22',venue:'',city:'Pontevedra',group:'Carlos Ares',fac:null},
  {id:'p34',date:'2026-08-23',venue:'',city:'San Vicente (Pontevedra)',group:'Carlos Ares',fac:null},
  {id:'p35',date:'2026-08-27',venue:'',city:'Cartagena',group:'Carlos Ares',fac:null},
];
let saved=JSON.parse(localStorage.getItem('tcV8')||'null');
if(!saved){saved=PRELOAD;localStorage.setItem('tcV8',JSON.stringify(saved));}
let evs=saved;
let actId=null,lines=[];
const today=new Date();today.setHours(0,0,0,0);
let curY=today.getFullYear(),curM=today.getMonth();
const DAYS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MO=['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const MS=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
function sv(){localStorage.setItem('tcV8',JSON.stringify(evs));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function changeMonth(n){curM+=n;if(curM>11){curM=0;curY++;}if(curM<0){curM=11;curY--;}render();window.scrollTo({top:0,behavior:'smooth'});}
function render(){
 const mcHeader=evs.filter(e=>e.date.startsWith(curY+'-'+String(curM+1).padStart(2,'0'))).length;
document.getElementById('topCount').textContent=String(mcHeader).padStart(3,'0');
  document.getElementById('topYear').textContent=today.getFullYear()+'/'+(today.getFullYear()+1);
  document.getElementById('monthName').textContent=MO[curM];
  document.getElementById('monthYear').textContent=curY;
  const dim=new Date(curY,curM+1,0).getDate();
  const mc=evs.filter(e=>e.date.startsWith(curY+'-'+String(curM+1).padStart(2,'0'))).length;
  document.getElementById('monthCount').textContent=mc+' show'+(mc!==1?'s':'')+' este mes';
  const list=document.getElementById('dayList');list.innerHTML='';
  for(let d=1;d<=dim;d++){
    const date=new Date(curY,curM,d);
    const dateStr=ds(date);
    const dayEvs=evs.filter(e=>e.date===dateStr);
    const hasShow=dayEvs.length>0;
    const isToday=date.toDateString()===today.toDateString();
    const block=document.createElement('div');
    block.className='day-block'+(hasShow?' has-show':'');
    const hdr=document.createElement('div');hdr.className='day-header';
    hdr.innerHTML=`<div class="day-num-big${isToday?' today':''}">${String(d).padStart(2,'0')}</div><div class="day-right"><div class="day-weekday">${DAYS[date.getDay()]}</div><div class="day-month-label">${MO[curM]}</div></div><div class="day-indicator">${hasShow?'●':'+'}</div>`;
    hdr.onclick=()=>block.classList.toggle('open');
    block.appendChild(hdr);
    const cont=document.createElement('div');cont.className='day-shows-cont';
    dayEvs.forEach(ev=>{
      const sd=document.createElement('div');sd.className='day-show';
      sd.innerHTML=`<div class="show-venue">${ev.venue}</div>${ev.group?`<div class="show-group">${ev.group}</div>`:''}<div class="show-city">${ev.city}</div><div class="show-btns"><button class="btn-inv" onclick="openInv('${ev.id}',event)">Factura</button><button class="btn-del" onclick="delEv('${ev.id}',event)">Borrar</button></div>`;
      cont.appendChild(sd);
    });
    const addDiv=document.createElement('div');addDiv.className='day-add';
    addDiv.innerHTML=`<div class="tap-add" onclick="openAdd('${dateStr}')">+ Añadir show</div>`;
    cont.appendChild(addDiv);
    block.appendChild(cont);
    list.appendChild(block);
  }
}
function openAdd(date){if(date)document.getElementById('eDate').value=date;document.getElementById('addOverlay').classList.add('open');}
function closeAll(){document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open'));}
document.getElementById('addOverlay').addEventListener('click',function(e){if(e.target===this)closeAll();});
document.getElementById('invOverlay').addEventListener('click',function(e){if(e.target===this)closeAll();});
function addEvent(){
  const date=document.getElementById('eDate').value;
  const venue=document.getElementById('eVenue').value.trim();
  const city=document.getElementById('eCity').value.trim();
  const group=document.getElementById('eGroup').value.trim();
  if(!date||!venue||!city){toast('Rellena todos los campos');return;}
  evs.push({id:Date.now().toString(),date,venue,city,group,fac:null});
  sv();closeAll();render();
  ['eVenue','eCity','eDate','eGroup'].forEach(x=>document.getElementById(x).value='');
  toast('Show añadido ✓');
}
function delEv(id,e){e.stopPropagation();evs=evs.filter(x=>x.id!==id);sv();render();toast('Show eliminado');}
function openInv(id,e){
  e.stopPropagation();actId=id;
  const ev=evs.find(x=>x.id===id);
  const d=new Date(ev.date+'T00:00:00');
  document.getElementById('invTitle').textContent=(ev.group||ev.city).toUpperCase()+' · '+MS[d.getMonth()]+' '+String(d.getDate()).padStart(2,'0');
  if(ev.fac){document.getElementById('i_artist').value=ev.fac.artist||'';document.getElementById('i_nif').value=ev.fac.nif||'';document.getElementById('i_address').value=ev.fac.address||'';document.getElementById('i_client').value=ev.fac.client||'';document.getElementById('i_cnif').value=ev.fac.cnif||'';document.getElementById('i_num').value=ev.fac.num||'';document.getElementById('i_iva').value=ev.fac.iva??21;lines=ev.fac.lines?JSON.parse(JSON.stringify(ev.fac.lines)):[];}
  else{['i_artist','i_nif','i_address','i_client','i_cnif'].forEach(x=>document.getElementById(x).value='');document.getElementById('i_num').value='FAC-'+ev.date.replace(/-/g,'');document.getElementById('i_iva').value=21;lines=[{desc:'Actuación en '+ev.city,price:0}];}
  renderLines();document.getElementById('invOverlay').classList.add('open');
}
function renderLines(){const c=document.getElementById('liCont');c.innerHTML='';lines.forEach((l,i)=>{const r=document.createElement('div');r.className='li-row';r.innerHTML=`<input type="text" class="li-in" placeholder="Concepto" value="${l.desc||''}" oninput="lines[${i}].desc=this.value;saveFac()"><input type="number" class="li-in li-r" placeholder="€" value="${l.price||''}" oninput="lines[${i}].price=parseFloat(this.value)||0;calcTotal();saveFac()"><button class="btn-rm" onclick="rmLine(${i})">×</button>`;c.appendChild(r);});calcTotal();}
function rmLine(i){lines.splice(i,1);renderLines();saveFac();}
function addLine(){lines.push({desc:'',price:0});renderLines();}
function calcTotal(){const iva=parseFloat(document.getElementById('i_iva').value)||0;const base=lines.reduce((s,l)=>s+(parseFloat(l.price)||0),0);document.getElementById('invTotal').textContent='€'+(base*(1+iva/100)).toFixed(2);}
function saveFac(){if(!actId)return;const ev=evs.find(x=>x.id===actId);if(!ev)return;ev.fac={artist:document.getElementById('i_artist').value,nif:document.getElementById('i_nif').value,address:document.getElementById('i_address').value,client:document.getElementById('i_client').value,cnif:document.getElementById('i_cnif').value,num:document.getElementById('i_num').value,iva:parseFloat(document.getElementById('i_iva').value)||21,lines:JSON.parse(JSON.stringify(lines))};sv();}
function dlPDF(){saveFac();const ev=evs.find(x=>x.id===actId);const d=new Date(ev.date+'T00:00:00');const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const W=210,PL=20,PR=20,CW=W-PL-PR;doc.setFillColor(232,76,30);doc.rect(0,0,W,52,'F');doc.setFillColor(17,17,17);doc.rect(0,52,W,2,'F');doc.setTextColor(17,17,17);doc.setFont('helvetica','bold');doc.setFontSize(30);doc.text('FACTURA',PL,24);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text('Nº '+(document.getElementById('i_num').value||'—'),PL,35);doc.text(String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(),PL,42);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text(((ev.group||'')+' · '+ev.city).toUpperCase(),W-PR,32,{align:'right'});let y=70;const artist=document.getElementById('i_artist').value||'—';const nif=document.getElementById('i_nif').value||'—';const address=document.getElementById('i_address').value||'—';const client=document.getElementById('i_client').value||'—';const cnif=document.getElementById('i_cnif').value||'—';doc.setFillColor(245,245,245);doc.rect(PL,y-5,CW/2-4,32,'F');doc.rect(W/2+2,y-5,CW/2-4,32,'F');doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(136,136,136);doc.text('ARTISTA / EMISOR',PL+3,y+2);doc.text('CLIENTE / PROMOTOR',W/2+5,y+2);doc.setTextColor(17,17,17);doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(artist,PL+3,y+10);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('NIF: '+nif,PL+3,y+17);doc.text(address,PL+3,y+23,{maxWidth:CW/2-10});doc.setFont('helvetica','bold');doc.setFontSize(10);doc.text(client,W/2+5,y+10);doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text('NIF: '+cnif,W/2+5,y+17);y+=44;doc.setFillColor(17,17,17);doc.rect(PL,y,CW,8,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text('CONCEPTO',PL+4,y+5.5);doc.text('IMPORTE',W-PR-4,y+5.5,{align:'right'});y+=10;let base=0;doc.setTextColor(17,17,17);lines.forEach((l,i)=>{const b=i%2===0?255:248;doc.setFillColor(b,b,b);doc.rect(PL,y-4,CW,8,'F');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.text(l.desc||'—',PL+4,y+1);doc.text('€'+(parseFloat(l.price)||0).toFixed(2),W-PR-4,y+1,{align:'right'});base+=parseFloat(l.price)||0;y+=9;});y+=6;const iva=parseFloat(document.getElementById('i_iva').value)||21;const ivaA=base*iva/100,tot=base+ivaA;doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(17,17,17);doc.text('Base imponible',PL+4,y);doc.text('€'+base.toFixed(2),W-PR-4,y,{align:'right'});y+=8;doc.setTextColor(232,76,30);doc.text('IVA '+iva+'%',PL+4,y);doc.text('€'+ivaA.toFixed(2),W-PR-4,y,{align:'right'});y+=10;doc.setFillColor(17,17,17);doc.rect(PL,y-4,CW,12,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('TOTAL',PL+4,y+4);doc.text('€'+tot.toFixed(2),W-PR-4,y+4,{align:'right'});doc.setFillColor(232,76,30);doc.rect(0,285,W,12,'F');doc.setTextColor(17,17,17);doc.setFont('helvetica','bold');doc.setFontSize(7);doc.text('TOUR CALENDAR',PL,292);doc.setFont('helvetica','normal');doc.text('Generado el '+new Date().toLocaleDateString('es-ES'),W-PR,292,{align:'right'});doc.save('factura_'+ev.date+'.pdf');toast('PDF descargado ✓');}
render();
</script>
